<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小公主的注音練習本 ✏️</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fef9f2;
            --accent-pink: #ffafcc;
            --accent-blue: #a2d2ff;
            --accent-green: #bde0fe;
            --text-color: #5c5c5c;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #fff1e6 100%);
            height: 100vh;
            height: 100dvh;
            /* 避免手機瀏覽器網址列遮擋底部 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        header,
        .word-container,
        .controls {
            flex-shrink: 0;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: var(--text-color);
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* 單詞與圖片顯示區 */
        .word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .char-block {
            display: flex;
            align-items: center;
        }

        .char-text {
            font-size: 4rem;
            font-weight: 700;
            color: #d62828;
            margin-right: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .char-text:active {
            transform: scale(0.9);
        }

        .zhuyin-wrapper {
            display: flex;
            gap: 6px;
        }

        .zhuyin-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tone-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slot {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: 3px solid #eee;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #ccc;
            position: relative;
            transition: all 0.3s;
        }

        .slot.active {
            border-color: var(--accent-pink);
            box-shadow: 0 0 15px var(--accent-pink);
            transform: scale(1.1);
            color: #aaa;
        }

        .slot.active::after {
            content: "✍️";
            position: absolute;
            top: -20px;
            font-size: 1.2rem;
        }

        .slot.filled {
            color: var(--text-color);
            border-color: #b7e4c7;
            background-color: #f7fff7;
        }

        .slot.tone {
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            border-radius: 50%;
        }

        /* 畫板區域 */
        .drawing-area {
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 120px;
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 4px dashed #ffe5ec;
        }

        #canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        .hint-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            color: rgba(255, 175, 204, 0.2);
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 1s;
        }

        .hint-text.visible {
            opacity: 1;
        }

        /* 按鈕區 */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 500px;
        }

        button {
            flex: 1;
            padding: 15px 5px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-clear {
            background-color: #eee;
            color: #888;
        }

        .btn-hint {
            background-color: var(--accent-blue);
            color: white;
        }

        .btn-done {
            background-color: var(--accent-pink);
            color: white;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* 特效疊加 */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 175, 204, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            text-align: center;
        }

        .success-overlay h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .success-overlay .btn-next {
            background: white;
            color: var(--accent-pink);
            padding: 20px 40px;
            font-size: 1.5rem;
        }

        /* 手機版 RWD 縮放 */
        @media (max-width: 600px) {
            header {
                padding: 10px;
            }

            h1 {
                font-size: 1.2rem;
            }

            .word-container {
                gap: 15px;
                margin-bottom: 15px;
            }

            .char-text {
                font-size: 3.5rem;
                margin-right: 5px;
            }

            .zhuyin-wrapper {
                gap: 4px;
            }

            .zhuyin-column {
                gap: 4px;
            }

            .slot {
                width: 40px;
                height: 40px;
                font-size: 1.4rem;
                border-width: 2px;
                border-radius: 8px;
            }

            .slot.tone {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }

            .slot.active::after {
                top: -18px;
                font-size: 1rem;
            }

            .drawing-area {
                margin-bottom: 10px;
                border-width: 3px;
                border-radius: 16px;
            }

            .hint-text {
                font-size: 4rem;
            }

            .controls {
                gap: 10px;
                margin-bottom: 10px;
                padding-bottom: max(10px, env(safe-area-inset-bottom));
                width: 95%;
                max-width: 100%;
            }

            button {
                padding: 12px 5px;
                font-size: 1.1rem;
            }

            .success-overlay h2 {
                font-size: 2.2rem;
            }

            .success-overlay .btn-next {
                padding: 15px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>ㄅㄆㄇ 聰明練習本 ✨</h1>
    </header>

    <div class="word-container" id="word-container">
        <!-- char blocks will be injected here -->
    </div>

    <div class="drawing-area">
        <div class="hint-text" id="canvas-hint"></div>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearCanvas()">🔄 重寫</button>
        <button class="btn-hint" onclick="showHint()">💡 提示</button>
        <button class="btn-done" onclick="submitStroke()">✅ 完成囉！</button>
    </div>

    <div class="success-overlay" id="overlay">
        <h2>太棒了！🌟</h2>
        <button class="btn-next" onclick="resetGame()">下一個挑戰</button>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // 資料定義
        const wordsData = [
            { text: "蘋果", chars: [{ c: "蘋", p: ["ㄆ", "一", "ㄥ", "ˊ"] }, { c: "果", p: ["ㄍ", "ㄨ", "ㄛ", "ˇ"] }] },
            { text: "太陽", chars: [{ c: "太", p: ["ㄊ", "ㄞ", "ˋ"] }, { c: "陽", p: ["一", "ㄤ", "ˊ"] }] },
            { text: "氣球", chars: [{ c: "氣", p: ["ㄑ", "一", "ˋ"] }, { c: "球", p: ["ㄑ", "一", "ㄡ", "ˊ"] }] },
            { text: "漢堡", chars: [{ c: "漢", p: ["ㄏ", "ㄢ", "ˋ"] }, { c: "堡", p: ["ㄅ", "ㄠ", "ˇ"] }] },
            { text: "大象", chars: [{ c: "大", p: ["ㄉ", "ㄚ", "ˋ"] }, { c: "象", p: ["ㄒ", "一", "ㄤ", "ˋ"] }] },
            { text: "長頸鹿", chars: [{ c: "長", p: ["ㄔ", "ㄤ", "ˊ"] }, { c: "頸", p: ["ㄐ", "一", "ㄥ", "ˇ"] }, { c: "鹿", p: ["ㄌ", "ㄨ", "ˋ"] }] },
            { text: "雞蛋", chars: [{ c: "雞", p: ["ㄐ", "一"] }, { c: "蛋", p: ["ㄉ", "ㄢ", "ˋ"] }] },
            { text: "貓咪", chars: [{ c: "貓", p: ["ㄇ", "ㄠ"] }, { c: "咪", p: ["ㄇ", "一"] }] },
            { text: "餅乾", chars: [{ c: "餅", p: ["ㄅ", "一", "ㄥ", "ˇ"] }, { c: "乾", p: ["ㄍ", "ㄢ"] }] },
            { text: "書本", chars: [{ c: "書", p: ["ㄕ", "ㄨ"] }, { c: "本", p: ["ㄅ", "ㄣ", "ˇ"] }] },
            { text: "鉛筆", chars: [{ c: "鉛", p: ["ㄑ", "一", "ㄢ"] }, { c: "筆", p: ["ㄅ", "一", "ˇ"] }] },
            { text: "香蕉", chars: [{ c: "香", p: ["ㄒ", "一", "ㄤ"] }, { c: "蕉", p: ["ㄐ", "一", "ㄠ"] }] },
            { text: "西瓜", chars: [{ c: "西", p: ["ㄒ", "一"] }, { c: "瓜", p: ["ㄍ", "ㄨ", "ㄚ"] }] },
            { text: "汽車", chars: [{ c: "汽", p: ["ㄑ", "一", "ˋ"] }, { c: "車", p: ["ㄔ", "ㄜ"] }] },
            { text: "腳踏車", chars: [{ c: "腳", p: ["ㄐ", "一", "ㄠ", "ˇ"] }, { c: "踏", p: ["ㄊ", "ㄚ", "ˋ"] }, { c: "車", p: ["ㄔ", "ㄜ"] }] },
            { text: "溜滑梯", chars: [{ c: "溜", p: ["ㄌ", "一", "ㄡ"] }, { c: "滑", p: ["ㄏ", "ㄨ", "ㄚ", "ˊ"] }, { c: "梯", p: ["ㄊ", "一"] }] },
            { text: "螃蟹", chars: [{ c: "螃", p: ["ㄆ", "ㄤ", "ˊ"] }, { c: "蟹", p: ["ㄒ", "一", "ㄝ", "ˋ"] }] },
            { text: "蝴蝶", chars: [{ c: "蝴", p: ["ㄏ", "ㄨ", "ˊ"] }, { c: "蝶", p: ["ㄉ", "一", "ㄝ", "ˊ"] }] },
            { text: "蜻蜓", chars: [{ c: "蜻", p: ["ㄑ", "一", "ㄥ"] }, { c: "蜓", p: ["ㄊ", "一", "ㄥ", "ˊ"] }] },
            { text: "草莓", chars: [{ c: "草", p: ["ㄘ", "ㄠ", "ˇ"] }, { c: "莓", p: ["ㄇ", "ㄟ", "ˊ"] }] }
        ];

        let wordIndices = [];
        let currentOrderIndex = 0;
        let currentWordIndex = 0;
        let currentSlotIndex = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initOrder() {
            wordIndices = Array.from({ length: wordsData.length }, (_, i) => i);
            shuffleArray(wordIndices);
            currentOrderIndex = 0;
            currentWordIndex = wordIndices[currentOrderIndex];
        }

        initOrder();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('word-container');
        const canvasHint = document.getElementById('canvas-hint');
        const overlay = document.getElementById('overlay');

        let isDrawing = false;
        let points = [];
        let currentStroke = { xs: [], ys: [], times: [] };
        let ink = [];

        // 初始化
        function initGame() {
            const word = wordsData[currentWordIndex];
            container.innerHTML = '';

            // 攤平 pinyin 陣列，讓原有的進度與陣列對應邏輯能繼續正常運作
            word.pinyin = word.chars.flatMap(c => c.p);

            currentSlotIndex = 0;
            let flatSlotIdx = 0;

            word.chars.forEach(charObj => {
                const charBlock = document.createElement('div');
                charBlock.className = 'char-block';

                const charText = document.createElement('div');
                charText.className = 'char-text';
                charText.innerText = charObj.c;
                charText.title = "點擊聽發音";
                charText.onclick = () => speak(charObj.c);
                charBlock.appendChild(charText);

                const zhuyinWrapper = document.createElement('div');
                zhuyinWrapper.className = 'zhuyin-wrapper';

                const zhuyinCol = document.createElement('div');
                zhuyinCol.className = 'zhuyin-column';

                const toneCol = document.createElement('div');
                toneCol.className = 'tone-column';

                charObj.p.forEach((charPinyin) => {
                    const div = document.createElement('div');
                    const isFirst = (flatSlotIdx === 0);
                    div.className = 'slot' + (isFirst ? ' active' : '');
                    div.innerText = '？';
                    div.dataset.index = flatSlotIdx;

                    const localIdx = flatSlotIdx;
                    div.onclick = () => {
                        if (localIdx === currentSlotIndex) showHint();
                    };

                    // 分辨是否為聲調
                    if (['ˊ', 'ˇ', 'ˋ', '˙'].includes(charPinyin)) {
                        div.classList.add('tone');
                        toneCol.appendChild(div);
                    } else {
                        zhuyinCol.appendChild(div);
                    }
                    flatSlotIdx++;
                });

                zhuyinWrapper.appendChild(zhuyinCol);
                zhuyinWrapper.appendChild(toneCol);
                charBlock.appendChild(zhuyinWrapper);
                container.appendChild(charBlock);
            });

            updateHint();
            speak(`我們來寫：${word.text}`);
            resizeCanvas();
        }

        function updateHint() {
            const char = wordsData[currentWordIndex].pinyin[currentSlotIndex];
            canvasHint.innerText = char;
            hideHint();

            const slots = document.querySelectorAll('.slot');
            slots.forEach((s, idx) => {
                s.classList.remove('active');
                if (idx === currentSlotIndex) s.classList.add('active');
            });
        }

        function showHint() {
            canvasHint.classList.add('visible');
            speak(wordsData[currentWordIndex].pinyin[currentSlotIndex]);
        }

        function hideHint() {
            canvasHint.classList.remove('visible');
        }

        // 畫板功能
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#ff8fab';
        }

        window.addEventListener('resize', resizeCanvas);

        function startDrawing(e) {
            isDrawing = true;
            hideHint();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            points.push(pos);
            currentStroke = { xs: [pos.x], ys: [pos.y], times: [Date.now()] };
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            points.push(pos);
            currentStroke.xs.push(pos.x);
            currentStroke.ys.push(pos.y);
            currentStroke.times.push(Date.now());
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                if (currentStroke.xs.length > 0) {
                    ink.push([currentStroke.xs, currentStroke.ys, currentStroke.times]);
                }
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // 使用更精準的 Pointer Events 改善手機觸控（支援防邊緣跳動與手掌誤觸）
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            canvas.setPointerCapture(e.pointerId);
            startDrawing(e);
        });
        canvas.addEventListener('pointermove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('pointerup', (e) => {
            e.preventDefault();
            canvas.releasePointerCapture(e.pointerId);
            stopDrawing();
        });
        canvas.addEventListener('pointercancel', (e) => {
            e.preventDefault();
            stopDrawing();
        });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            points = [];
            ink = [];
            hideHint();
        }

        // 提交與進度
        async function submitStroke() {
            if (ink.length === 0) {
                speak("再多畫幾筆喔！");
                return;
            }

            const char = wordsData[currentWordIndex].pinyin[currentSlotIndex];

            // 讀取按鈕以顯示 Loading 狀態
            const btnDone = document.querySelector('.btn-done');
            const originalText = btnDone.innerText;
            btnDone.innerText = "辨識中...";
            btnDone.disabled = true;

            const requestData = {
                options: "enable_pre_space",
                requests: [{
                    writing_guide: { writing_area_width: canvas.width, writing_area_height: canvas.height },
                    ink: ink,
                    language: "zh-TW"
                }]
            };

            let isMatch = false;

            try {
                const response = await fetch("https://inputtools.google.com/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestData)
                });
                const data = await response.json();

                if (data[0] === "SUCCESS") {
                    const suggestions = data[1][0][1];
                    // 檢查正確答案是否出現在建議清單中 (寬容度高，如果前幾名有符合就算對)
                    if (suggestions.includes(char)) {
                        isMatch = true;
                    }
                }
            } catch (err) {
                console.error("Handwriting API Error:", err);
                // 發生錯誤的話，暫時直接放行或當作失敗？
                // 這裡選擇當作辨識錯誤，以免學習中斷，但也可以選擇放行。
            } finally {
                btnDone.innerText = originalText;
                btnDone.disabled = false;
            }

            if (isMatch) {
                speak(char);

                // 更新 Slot UI
                const slots = document.querySelectorAll('.slot');
                slots[currentSlotIndex].innerText = char;
                slots[currentSlotIndex].classList.add('filled');

                clearCanvas();
                currentSlotIndex++;

                if (currentSlotIndex >= wordsData[currentWordIndex].pinyin.length) {
                    finishWord();
                } else {
                    updateHint();
                }
            } else {
                speak("哎呀，好像不太對喔！再試一次吧！");

                // 加上一個簡單的錯誤視覺提示：將畫板震動或變紅 (如果想要的話)
                const drawingArea = document.querySelector('.drawing-area');
                drawingArea.style.borderColor = "red";
                drawingArea.style.transform = "translateX(-5px)";
                setTimeout(() => drawingArea.style.transform = "translateX(5px)", 100);
                setTimeout(() => drawingArea.style.transform = "translateX(0)", 200);
                setTimeout(() => drawingArea.style.borderColor = "#ffe5ec", 1000);

                clearCanvas();
            }
        }

        function finishWord() {
            speak(`好聰明！拼對囉：${wordsData[currentWordIndex].text}`);
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffafcc', '#a2d2ff', '#bde0fe', '#ffc8dd']
            });

            setTimeout(() => {
                overlay.style.display = 'flex';
            }, 1000);
        }

        function resetGame() {
            overlay.style.display = 'none';
            currentOrderIndex++;
            if (currentOrderIndex >= wordIndices.length) {
                shuffleArray(wordIndices);
                currentOrderIndex = 0;
            }
            currentWordIndex = wordIndices[currentOrderIndex];
            initGame();
        }

        // 語音功能
        function speak(text) {
            if ('speechSynthesis' in window) {
                // 移除延遲，因為 iOS 規定語音必須在「點擊事件當下」直接觸發，否則會被阻擋
                // 移除 cancel()，因為在某些版本的 Safari 呼叫 cancel 後再 speak 會完全沒聲音
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-TW';
                utter.rate = 0.9;
                
                // 嘗試抓取本地語音庫，讓發音更穩定
                const voices = window.speechSynthesis.getVoices();
                const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh_TW'));
                if (twVoice) {
                    utter.voice = twVoice;
                }

                window.speechSynthesis.speak(utter);
            } else {
                console.warn("您的瀏覽器不支援語音合成功能");
            }
        }

        // 啟動
        setTimeout(initGame, 500);

    </script>
</body>

</html>
