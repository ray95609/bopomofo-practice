<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小公主的注音練習本 ✏️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fff0f5;
            --primary-bg-darker: #ffe5ec;
            --accent-pink: #ff9ebd;
            --accent-pink-dark: #ff7aa6;
            --accent-blue: #8fd3f4;
            --accent-blue-dark: #6ebbe2;
            --accent-green: #a8e6cf;
            --accent-green-dark: #8bcaa8;
            --accent-orange: #ffb86c;
            --accent-orange-dark: #e89e53;
            --text-color: #6a6a6a;
            --text-pink: #ff6b81;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 0%, var(--primary-bg) 0%, var(--primary-bg-darker) 100%);
            height: 100vh;
            height: 100dvh;
            /* 避免手機瀏覽器網址列遮擋底部 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        header,
        .word-container,
        .controls {
            flex-shrink: 0;
        }

        header {
            padding: 10px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: var(--text-color);
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* 單詞與圖片顯示區 */
        .question-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            flex-shrink: 0;
            padding: 0 10px;
        }

        .question-image-box {
            width: 140px;
            height: 140px;
            background: #fff;
            border: 8px solid #fff;
            box-shadow: 0 12px 30px rgba(255, 158, 189, 0.3), inset 0 0 20px #fff0f5;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem;
            flex-shrink: 0;
            overflow: hidden;
            animation: bounce-float 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
        }

        .question-image-box:active {
            transform: scale(0.9);
            filter: brightness(0.95);
        }

        @keyframes bounce-float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            25% {
                transform: translateY(-8px) rotate(-3deg);
            }

            75% {
                transform: translateY(-5px) rotate(3deg);
            }
        }

        .question-image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 32px;
        }

        .word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            max-width: 100%;
        }

        .char-block {
            display: flex;
            align-items: center;
        }

        .char-text {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-pink);
            margin-right: 8px;
            text-shadow: 3px 3px 0 #fff, 4px 4px 0 rgba(255, 107, 129, 0.2);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char-text:active {
            transform: scale(0.8) rotate(-5deg);
        }

        .zhuyin-wrapper {
            display: flex;
            gap: 6px;
        }

        .zhuyin-column {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tone-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slot {
            width: 52px;
            height: 52px;
            background: #fffcfd;
            border: 4px solid #fff;
            border-radius: 20px;
            box-shadow: 0 6px 0 #ffe5ec;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffb8c6;
            position: relative;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 6px;
        }

        .slot.active {
            border-color: var(--accent-pink);
            box-shadow: 0 6px 0 var(--accent-pink-dark);
            transform: translateY(-4px) scale(1.15);
            color: var(--accent-pink);
            background: #fff;
            z-index: 20;
            cursor: pointer;
        }

        .slot.active:active {
            box-shadow: 0 0px 0 var(--accent-pink-dark);
            transform: translateY(2px) scale(1.1);
        }

        .slot.active::after {
            content: "✍️";
            position: absolute;
            top: -22px;
            font-size: 1.3rem;
            animation: bounce-float 1.5s infinite;
            z-index: 20;
        }

        .slot.filled {
            color: var(--text-color);
            border-color: var(--accent-green);
            box-shadow: 0 6px 0 var(--accent-green-dark);
            background-color: #f0fff4;
        }

        .slot.tone {
            width: 42px;
            height: 42px;
            font-size: 1.6rem;
            border-radius: 50%;
        }

        /* 針對三個字以上的版面微調 */
        .word-container.is-long-word {
            gap: 20px 10px;
        }

        .is-long-word .char-text {
            font-size: 3rem;
        }

        .is-long-word .slot {
            width: 40px;
            height: 40px;
            font-size: 1.4rem;
        }

        .is-long-word .slot.tone {
            width: 30px;
            height: 30px;
            font-size: 1.1rem;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-grow: 1;
            padding: 10px;
            gap: 15px;
            max-width: 800px;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            max-width: 500px;
            height: 100%;
            justify-content: center;
            min-width: 0;
        }

        /* 遊戲進度與怪物區 (直立式) */
        .game-status-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: white;
            padding: 15px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            height: 60dvh;
            max-height: 600px;
            width: 60px;
            flex-shrink: 0;
            gap: 15px;
        }

        .progress-container {
            width: 22px;
            flex-grow: 1;
            background: #fdf5f7;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .progress-fill {
            width: 100%;
            background: linear-gradient(0deg, var(--accent-pink), var(--accent-pink-dark));
            height: 0%;
            transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.5s;
            border-radius: 10px;
        }

        .monster-display {
            font-size: 3rem;
            animation: monster-idle 1.5s infinite alternate ease-in-out;
            transition: transform 0.3s, opacity 0.5s, filter 0.3s;
            line-height: 1;
            cursor: pointer;
        }

        .monster-display:active {
            transform: scale(0.9) rotate(0deg) !important;
            animation: none !important;
        }

        .monster-display.hurt {
            transform: scale(0.8) rotate(-15deg);
            filter: brightness(50%) sepia(100%) hue-rotate(300deg) saturate(300%);
            animation: none;
        }

        .monster-display.defeated {
            transform: scale(0) rotate(180deg);
            opacity: 0;
            animation: none;
        }

        @keyframes monster-idle {

            0% {
                transform: translateY(0) scale(1) rotate(-3deg);
            }

            100% {
                transform: translateY(-10px) scale(1.1) rotate(3deg);
            }
        }

        /* 畫板區域 */
        .drawing-area {
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 120px;
            max-height: 50dvh;
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 158, 189, 0.15);
            margin-bottom: 90px;
            /* 預留底部按鈕空間 */
            position: relative;
            overflow: hidden;
            border: 6px dashed #ffb8c6;
        }

        #canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        .hint-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            color: rgba(255, 175, 204, 0.2);
            pointer-events: none;
            user-select: none;
            opacity: 0;
            transition: opacity 1s;
        }

        .hint-text.visible {
            opacity: 1;
        }

        /* 按鈕區 */
        .controls {
            display: flex;
            gap: 20px;
            width: 90%;
            max-width: 500px;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        button {
            flex: 1;
            padding: 15px 5px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: translateY(0);
        }

        .btn-clear {
            background-color: #f7f1e3;
            color: #aaa69d;
            box-shadow: 0 6px 0 #d1ccc0;
        }

        .btn-clear:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #d1ccc0;
        }

        .btn-hint {
            background-color: var(--accent-blue);
            color: white;
            box-shadow: 0 6px 0 var(--accent-blue-dark);
        }

        .btn-hint:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--accent-blue-dark);
        }

        .btn-done {
            background-color: var(--accent-orange);
            color: white;
            box-shadow: 0 6px 0 var(--accent-orange-dark);
        }

        .btn-done:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--accent-orange-dark);
        }

        /* 特效疊加 */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .success-card {
            background: #fff9fa;
            border: 8px solid #fff;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 158, 189, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-align: center;
            max-width: 90%;
        }

        .success-card h2 {
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--accent-pink-dark);
            text-shadow: 2px 2px 0 #ffe5ec;
            margin: 0 0 20px 0;
        }

        .success-card .btn-next {
            background: var(--accent-pink);
            color: white;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            box-shadow: 0 8px 0 var(--accent-pink-dark);
            border: none;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transform: translateY(0);
        }

        .success-card .btn-next:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--accent-pink-dark);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 手機版 RWD 縮放 */
        @media (max-width: 600px) {
            header {
                padding: 8px;
            }

            h1 {
                font-size: 1.1rem;
            }

            .question-layout {
                gap: 8px;
                margin-bottom: 10px;
                padding: 0;
            }

            .question-image-box {
                width: 120px;
                height: 120px;
                font-size: 4.5rem;
                border-radius: 30px;
                border-width: 4px;
            }

            .word-container {
                gap: 6px;
                padding: 2px;
            }

            .char-text {
                font-size: clamp(2.5rem, 8vw, 3.5rem);
                margin-right: 4px;
            }

            .zhuyin-wrapper {
                gap: 3px;
            }

            .zhuyin-column {
                gap: 3px;
            }

            .slot {
                width: clamp(38px, 10vw, 42px);
                height: clamp(38px, 10vw, 42px);
                font-size: clamp(1.4rem, 4vw, 1.6rem);
                border-width: 3px;
                border-radius: 14px;
                box-shadow: 0 4px 0 #ffe5ec;
                margin-bottom: 4px;
            }

            .slot.active {
                box-shadow: 0 4px 0 var(--accent-pink-dark);
            }

            .slot.active:active {
                box-shadow: 0 0px 0 var(--accent-pink-dark);
                transform: translateY(0px) scale(1.1);
            }

            .slot.tone {
                width: clamp(28px, 8vw, 34px);
                height: clamp(28px, 8vw, 34px);
                font-size: clamp(1rem, 3vw, 1.2rem);
            }

            .slot.active::after {
                top: -20px;
                font-size: 1.1rem;
            }

            .word-container.is-long-word {
                gap: 15px 4px;
            }

            .is-long-word .char-text {
                font-size: clamp(1.8rem, 6vw, 2.2rem);
                margin-right: 2px;
            }

            .is-long-word .slot {
                width: clamp(28px, 8.5vw, 32px);
                height: clamp(28px, 8.5vw, 32px);
                font-size: clamp(1rem, 3vw, 1.2rem);
                border-width: 2px;
            }

            .is-long-word .slot.tone {
                width: clamp(22px, 6.5vw, 24px);
                height: clamp(22px, 6.5vw, 24px);
                font-size: clamp(0.85rem, 2.5vw, 0.9rem);
            }

            .is-long-word .slot.active::after {
                top: -16px;
                font-size: 0.9rem;
            }

            .drawing-area {
                margin-bottom: 80px;
                /* 預留底部按鈕空間 */
                border-width: 3px;
                border-radius: 16px;
            }

            .hint-text {
                font-size: 4rem;
            }

            .controls {
                gap: 10px;
                bottom: 0;
                width: 100%;
                max-width: 100%;
                padding: 10px 15px max(15px, env(safe-area-inset-bottom));
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(255, 175, 204, 0.3);
            }

            button {
                padding: 12px 5px;
                font-size: 1.1rem;
            }

            .success-card {
                padding: 30px 20px;
            }

            .success-card h2 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }

            .success-card .btn-next {
                padding: 10px 24px;
                font-size: 1.1rem;
            }

            .main-layout {
                padding: 10px 5px;
                gap: 8px;
            }

            .center-content {
                justify-content: flex-start;
            }

            .game-status-bar {
                width: 50px;
                padding: 10px 5px;
                height: 60dvh;
                gap: 10px;
                border-radius: 20px;
                margin-bottom: 0px;
            }

            .progress-container {
                width: 14px;
            }

            .monster-display {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>

    <div class="main-layout">
        <div class="game-status-bar">
            <div class="monster-display" id="monster-display" onclick="playMonsterVoice()">👾</div>
            <div class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="center-content">
            <header>
                <!-- <h1>ㄅㄆㄇ 聰明練習本 ✨</h1> -->
            </header>

            <div class="question-layout">
                <div class="question-image-box" id="question-image">
                    <!-- image will be injected here -->
                </div>
                <div class="word-container" id="word-container">
                    <!-- char blocks will be injected here -->
                </div>
            </div>

            <div class="drawing-area">
                <div class="hint-text" id="canvas-hint"></div>
                <canvas id="canvas"></canvas>
            </div>

            <div class="controls">
                <button class="btn-clear" onclick="clearCanvas()">🔄 重寫</button>
                <button class="btn-hint" onclick="showHint()">💡 提示</button>
                <button class="btn-done" onclick="submitStroke()">✅ 寫完了！</button>
            </div>
        </div>
    </div>

    <div class="success-overlay" id="overlay">
        <div class="success-card">
            <h2>太棒了！🌟</h2>
            <button class="btn-next" onclick="resetGame()">下一個挑戰</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        // 資料定義
        const ㄒ = [
            { text: "蘋果", img: "🍎", chars: [{ c: "蘋", p: ["ㄆ", "一", "ㄥ", "ˊ"] }, { c: "果", p: ["ㄍ", "ㄨ", "ㄛ", "ˇ"] }] },
            { text: "太陽", img: "☀️", chars: [{ c: "太", p: ["ㄊ", "ㄞ", "ˋ"] }, { c: "陽", p: ["一", "ㄤ", "ˊ"] }] },
            { text: "氣球", img: "🎈", chars: [{ c: "氣", p: ["ㄑ", "一", "ˋ"] }, { c: "球", p: ["ㄑ", "一", "ㄡ", "ˊ"] }] },
            { text: "漢堡", img: "🍔", chars: [{ c: "漢", p: ["ㄏ", "ㄢ", "ˋ"] }, { c: "堡", p: ["ㄅ", "ㄠ", "ˇ"] }] },
            { text: "大象", img: "🐘", chars: [{ c: "大", p: ["ㄉ", "ㄚ", "ˋ"] }, { c: "象", p: ["ㄒ", "一", "ㄤ", "ˋ"] }] },
            { text: "長頸鹿", img: "🦒", chars: [{ c: "長", p: ["ㄔ", "ㄤ", "ˊ"] }, { c: "頸", p: ["ㄐ", "一", "ㄥ", "ˇ"] }, { c: "鹿", p: ["ㄌ", "ㄨ", "ˋ"] }] },
            { text: "雞蛋", img: "🥚", chars: [{ c: "雞", p: ["ㄐ", "一"] }, { c: "蛋", p: ["ㄉ", "ㄢ", "ˋ"] }] },
            { text: "貓咪", img: "🐱", chars: [{ c: "貓", p: ["ㄇ", "ㄠ"] }, { c: "咪", p: ["ㄇ", "一"] }] },
            { text: "餅乾", img: "🍪", chars: [{ c: "餅", p: ["ㄅ", "一", "ㄥ", "ˇ"] }, { c: "乾", p: ["ㄍ", "ㄢ"] }] },
            { text: "書本", img: "📖", chars: [{ c: "書", p: ["ㄕ", "ㄨ"] }, { c: "本", p: ["ㄅ", "ㄣ", "ˇ"] }] },

            { text: "香蕉", img: "🍌", chars: [{ c: "香", p: ["ㄒ", "一", "ㄤ"] }, { c: "蕉", p: ["ㄐ", "一", "ㄠ"] }] },
            { text: "西瓜", img: "🍉", chars: [{ c: "西", p: ["ㄒ", "一"] }, { c: "瓜", p: ["ㄍ", "ㄨ", "ㄚ"] }] },
            { text: "汽車", img: "🚗", chars: [{ c: "汽", p: ["ㄑ", "一", "ˋ"] }, { c: "車", p: ["ㄔ", "ㄜ"] }] },
            { text: "腳踏車", img: "🚲", chars: [{ c: "腳", p: ["ㄐ", "一", "ㄠ", "ˇ"] }, { c: "踏", p: ["ㄊ", "ㄚ", "ˋ"] }, { c: "車", p: ["ㄔ", "ㄜ"] }] },
            { text: "溜滑梯", img: "🛝", chars: [{ c: "溜", p: ["ㄌ", "一", "ㄡ"] }, { c: "滑", p: ["ㄏ", "ㄨ", "ㄚ", "ˊ"] }, { c: "梯", p: ["ㄊ", "一"] }] },
            { text: "螃蟹", img: "🦀", chars: [{ c: "螃", p: ["ㄆ", "ㄤ", "ˊ"] }, { c: "蟹", p: ["ㄒ", "一", "ㄝ", "ˋ"] }] },

            { text: "海豚", img: "🐬", chars: [{ c: "海", p: ["ㄏ", "ㄞ", "ˇ"] }, { c: "豚", p: ["ㄊ", "ㄨ", "ㄣ", "ˊ"] }] },
            { text: "恐龍", img: "🦕", chars: [{ c: "恐", p: ["ㄎ", "ㄨ", "ㄥ", "ˇ"] }, { c: "龍", p: ["ㄌ", "ㄨ", "ㄥ", "ˊ"] }] },
            { text: "蛋糕", img: "🎂", chars: [{ c: "蛋", p: ["ㄉ", "ㄢ", "ˋ"] }, { c: "糕", p: ["ㄍ", "ㄠ"] }] },
            { text: "機器人", img: "🤖", chars: [{ c: "機", p: ["ㄐ", "一"] }, { c: "器", p: ["ㄑ", "一", "ˋ"] }, { c: "人", p: ["ㄖ", "ㄣ", "ˊ"] }] },
            { text: "棒棒糖", img: "🍭", chars: [{ c: "棒", p: ["ㄅ", "ㄤ", "ˋ"] }, { c: "棒", p: ["ㄅ", "ㄤ", "ˋ"] }, { c: "糖", p: ["ㄊ", "ㄤ", "ˊ"] }] },
            { text: "巧克力", img: "🍫", chars: [{ c: "巧", p: ["ㄑ", "一", "ㄠ", "ˇ"] }, { c: "克", p: ["ㄎ", "ㄜ", "ˋ"] }, { c: "力", p: ["ㄌ", "一", "ˋ"] }] },
            { text: "小狗", img: "🐶", chars: [{ c: "小", p: ["ㄒ", "一", "ㄠ", "ˇ"] }, { c: "狗", p: ["ㄍ", "ㄡ", "ˇ"] }] },
            { text: "蝸牛", img: "🐌", chars: [{ c: "蝸", p: ["ㄍ", "ㄨ", "ㄚ"] }, { c: "牛", p: ["ㄋ", "一", "ㄡ", "ˊ"] }] },
            { text: "綿羊", img: "🐑", chars: [{ c: "綿", p: ["ㄇ", "一", "ㄢ", "ˊ"] }, { c: "羊", p: ["一", "ㄤ", "ˊ"] }] },
            { text: "飛碟", img: "🛸", chars: [{ c: "飛", p: ["ㄈ", "ㄟ"] }, { c: "碟", p: ["ㄉ", "一", "ㄝ", "ˊ"] }] },
            { text: "雨鞋", img: "👢", chars: [{ c: "雨", p: ["ㄩ", "ˇ"] }, { c: "鞋", p: ["ㄒ", "一", "ㄝ", "ˊ"] }] },
            { text: "火箭", img: "🚀", chars: [{ c: "火", p: ["ㄏ", "ㄨ", "ㄛ", "ˇ"] }, { c: "箭", p: ["ㄐ", "一", "ㄢ", "ˋ"] }] }
        ];

        let wordIndices = [];
        let currentOrderIndex = 0;
        let currentWordIndex = 0;
        let currentSlotIndex = 0;
        let defeatedMonsters = 0;

        const monsters = ['👾', '👻', '👹', '👽', '👺'];
        const bossMonster = '🐲';

        const monsterPhrases = [
            "加油加油！小公主最棒了！",
            "快來幫我一起寫注音！",
            "我們一起打敗大魔王吧！",
            "寫完就可以吃糖果囉！",
            "嘿咻嘿咻！努力寫字！"
        ];

        let isSpeaking = false;

        function playMonsterVoice() {
            if (isSpeaking) return;

            const monster = document.getElementById('monster-display');
            if (monster.classList.contains('hurt') || monster.classList.contains('defeated')) return;

            // 視覺回饋
            monster.style.animation = 'none';
            monster.style.transform = 'scale(1.3) rotate(15deg)';
            setTimeout(() => {
                monster.style.transform = '';
                monster.style.animation = 'monster-idle 1.5s infinite alternate ease-in-out';
            }, 300);

            // 語音播放
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                isSpeaking = true;
                const phrase = monsterPhrases[Math.floor(Math.random() * monsterPhrases.length)];
                const utterance = new SpeechSynthesisUtterance(phrase);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.1; // 稍微快一點點
                utterance.pitch = 1.6; // 音調高一點，像小怪物或可愛的聲音

                utterance.onend = () => isSpeaking = false;
                utterance.onerror = () => isSpeaking = false;

                window.speechSynthesis.speak(utterance);
            }
        }

        function updateGameStatus() {
            const progressFill = document.getElementById('progress-fill');
            const monsterDisplay = document.getElementById('monster-display');

            if (monsterDisplay) {
                monsterDisplay.classList.remove('defeated', 'hurt');

                if (defeatedMonsters < 5) {
                    // 一般怪物
                    monsterDisplay.innerText = monsters[defeatedMonsters % monsters.length];
                    progressFill.style.height = `${(defeatedMonsters / 5) * 100}%`;
                    progressFill.style.background = 'linear-gradient(0deg, var(--accent-pink), #ffc8dd)';
                } else if (defeatedMonsters === 5) {
                    // 魔王出現
                    monsterDisplay.innerText = bossMonster;
                    progressFill.style.height = '100%';
                    progressFill.style.background = 'linear-gradient(0deg, #ff4d4d, #ff9999)';
                }
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initOrder() {
            wordIndices = Array.from({ length: wordsData.length }, (_, i) => i);
            shuffleArray(wordIndices);
            currentOrderIndex = 0;
            currentWordIndex = wordIndices[currentOrderIndex];
        }

        initOrder();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('word-container');
        const canvasHint = document.getElementById('canvas-hint');
        const overlay = document.getElementById('overlay');

        let isDrawing = false;
        let points = [];
        let currentStroke = { xs: [], ys: [], times: [] };
        let ink = [];

        // 初始化
        function initGame() {
            updateGameStatus();
            const word = wordsData[currentWordIndex];
            container.innerHTML = '';

            // 處理三字詞或高度過長的注音
            const hasTallZhuyin = word.chars.some(charObj => {
                return charObj.p.filter(c => !['ˊ', 'ˇ', 'ˋ', '˙'].includes(c)).length >= 3;
            });

            if (word.chars.length >= 3 || hasTallZhuyin) {
                container.classList.add('is-long-word');
            } else {
                container.classList.remove('is-long-word');
            }

            const imageBox = document.getElementById('question-image');

            // 綁定點擊圖片唸題目的功能
            imageBox.onclick = () => speak(word.text);
            imageBox.title = "點擊聽發音";

            if (word.img) {
                // 如果 img 是一個圖片網址或檔案路徑，顯示 <img>
                if (word.img.startsWith('http') || word.img.includes('/')) {
                    imageBox.innerHTML = `<img src="${word.img}" alt="${word.text}">`;
                } else {
                    // 如果是一般 Emoji 符號，直接顯示文字
                    imageBox.innerHTML = word.img;
                }
            } else {
                imageBox.innerHTML = '❓';
            }

            // 攤平 pinyin 陣列，讓原有的進度與陣列對應邏輯能繼續正常運作
            word.pinyin = word.chars.flatMap(c => c.p);

            currentSlotIndex = 0;
            let flatSlotIdx = 0;

            word.chars.forEach(charObj => {
                const charBlock = document.createElement('div');
                charBlock.className = 'char-block';

                const charText = document.createElement('div');
                charText.className = 'char-text';
                charText.innerText = charObj.c;
                charText.title = "點擊聽發音";
                charText.onclick = () => speak(charObj.c);
                charBlock.appendChild(charText);

                const zhuyinWrapper = document.createElement('div');
                zhuyinWrapper.className = 'zhuyin-wrapper';

                const zhuyinCol = document.createElement('div');
                zhuyinCol.className = 'zhuyin-column';

                const toneCol = document.createElement('div');
                toneCol.className = 'tone-column';

                charObj.p.forEach((charPinyin) => {
                    const div = document.createElement('div');
                    const isFirst = (flatSlotIdx === 0);
                    div.className = 'slot' + (isFirst ? ' active' : '');
                    div.innerText = '？';
                    div.dataset.index = flatSlotIdx;

                    const localIdx = flatSlotIdx;
                    div.onclick = () => {
                        if (localIdx === currentSlotIndex) {
                            // 點擊「？」只發音，不顯示注音浮水印
                            speak(wordsData[currentWordIndex].pinyin[currentSlotIndex]);
                        }
                    };

                    // 分辨是否為聲調
                    if (['ˊ', 'ˇ', 'ˋ', '˙'].includes(charPinyin)) {
                        div.classList.add('tone');
                        toneCol.appendChild(div);
                    } else {
                        zhuyinCol.appendChild(div);
                    }
                    flatSlotIdx++;
                });

                zhuyinWrapper.appendChild(zhuyinCol);
                zhuyinWrapper.appendChild(toneCol);
                charBlock.appendChild(zhuyinWrapper);
                container.appendChild(charBlock);
            });

            updateHint();
            speak(`我們來寫：${word.text}`);
            resizeCanvas();
        }

        function updateHint() {
            const char = wordsData[currentWordIndex].pinyin[currentSlotIndex];
            canvasHint.innerText = char;
            hideHint();

            const slots = document.querySelectorAll('.slot');
            slots.forEach((s, idx) => {
                s.classList.remove('active');
                if (idx === currentSlotIndex) s.classList.add('active');
            });
        }

        function showHint() {
            canvasHint.classList.add('visible');
            speak(wordsData[currentWordIndex].pinyin[currentSlotIndex]);
        }

        function hideHint() {
            canvasHint.classList.remove('visible');
        }

        // 畫板功能
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#ff8fab';
        }

        window.addEventListener('resize', resizeCanvas);

        function startDrawing(e) {
            isDrawing = true;
            hideHint();
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            points.push(pos);
            currentStroke = { xs: [pos.x], ys: [pos.y], times: [Date.now()] };
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            points.push(pos);
            currentStroke.xs.push(pos.x);
            currentStroke.ys.push(pos.y);
            currentStroke.times.push(Date.now());
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                if (currentStroke.xs.length > 0) {
                    ink.push([currentStroke.xs, currentStroke.ys, currentStroke.times]);
                }
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // 使用更精準的 Pointer Events 改善手機觸控（支援防邊緣跳動與手掌誤觸）
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            canvas.setPointerCapture(e.pointerId);
            startDrawing(e);
        });
        canvas.addEventListener('pointermove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('pointerup', (e) => {
            e.preventDefault();
            canvas.releasePointerCapture(e.pointerId);
            stopDrawing();
        });
        canvas.addEventListener('pointercancel', (e) => {
            e.preventDefault();
            stopDrawing();
        });

        // 避免 iOS Safari 觸發下拉更新 (Pull-to-refresh) 或上下滑動導致無法寫字
        document.addEventListener('touchmove', function (e) {
            e.preventDefault();
        }, { passive: false });

        // 特別針對畫布，防止額外的觸控干擾
        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
        }, { passive: false });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            points = [];
            ink = [];
            hideHint();
        }

        // 提交與進度
        async function submitStroke() {
            if (ink.length === 0) {
                speak("再多畫幾筆喔！");
                return;
            }

            const char = wordsData[currentWordIndex].pinyin[currentSlotIndex];

            // 讀取按鈕以顯示 Loading 狀態
            const btnDone = document.querySelector('.btn-done');
            const originalText = btnDone.innerText;
            btnDone.innerText = "辨識中...";
            btnDone.disabled = true;

            const requestData = {
                options: "enable_pre_space",
                requests: [{
                    writing_guide: { writing_area_width: canvas.width, writing_area_height: canvas.height },
                    ink: ink,
                    language: "zh-TW"
                }]
            };

            let isMatch = false;

            try {
                const response = await fetch("https://inputtools.google.com/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestData)
                });
                const data = await response.json();

                if (data[0] === "SUCCESS") {
                    const suggestions = data[1][0][1];
                    // 檢查正確答案是否出現在建議清單中 (寬容度高，如果前幾名有符合就算對)
                    if (suggestions.includes(char)) {
                        isMatch = true;
                    }
                }
            } catch (err) {
                console.error("Handwriting API Error:", err);
                // 發生錯誤的話，暫時直接放行或當作失敗？
                // 這裡選擇當作辨識錯誤，以免學習中斷，但也可以選擇放行。
            } finally {
                btnDone.innerText = originalText;
                btnDone.disabled = false;
            }

            if (isMatch) {
                speak(char);

                // 更新 Slot UI
                const slots = document.querySelectorAll('.slot');
                slots[currentSlotIndex].innerText = char;
                slots[currentSlotIndex].classList.add('filled');

                clearCanvas();
                currentSlotIndex++;

                if (currentSlotIndex >= wordsData[currentWordIndex].pinyin.length) {
                    finishWord();
                } else {
                    updateHint();
                }
            } else {
                speak("哎呀，好像不太對喔！再試一次吧！");

                // 加上一個簡單的錯誤視覺提示：將畫板震動或變紅 (如果想要的話)
                const drawingArea = document.querySelector('.drawing-area');
                drawingArea.style.borderColor = "red";
                drawingArea.style.transform = "translateX(-5px)";
                setTimeout(() => drawingArea.style.transform = "translateX(5px)", 100);
                setTimeout(() => drawingArea.style.transform = "translateX(0)", 200);
                setTimeout(() => drawingArea.style.borderColor = "#ffe5ec", 1000);

                clearCanvas();
            }
        }

        function finishWord() {
            speak(`太棒了！拼對囉：${wordsData[currentWordIndex].text}`);
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffafcc', '#a2d2ff', '#bde0fe', '#ffc8dd']
            });

            // 怪物受傷與打敗動畫
            const monsterDisplay = document.getElementById('monster-display');
            if (monsterDisplay) {
                monsterDisplay.classList.add('hurt');
                setTimeout(() => {
                    monsterDisplay.classList.add('defeated');
                }, 400);
            }

            setTimeout(() => {
                defeatedMonsters++;
                if (defeatedMonsters === 6) {
                    showCandyReward();
                } else {
                    if (defeatedMonsters === 5) {
                        speak("出現魔王了！快把它打敗！");
                        const overlay = document.getElementById('overlay');
                        overlay.innerHTML = `
                            <div class="success-card">
                                <h2 style="color: #ff6b81; text-shadow: 2px 2px 0 #ffe5ec;">🚨 魔王來了！ 🚨</h2>
                                <button class="btn-next" style="background: #ff6b81; box-shadow: 0 8px 0 #ee5253;" onclick="resetGame()">準備挑戰！</button>
                            </div>
                        `;
                    } else {
                        restoreDefaultOverlay();
                    }
                    document.getElementById('overlay').style.display = 'flex';
                }
            }, 1200);
        }

        function showCandyReward() {
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `
                <div class="success-card">
                    <h2 style="color: #ff6b81; text-shadow: 2px 2px 0 #ffe5ec;">打敗魔王了！🎉</h2>
                    <div style="font-size: 6rem; margin-bottom: 20px; animation: bounce-float 3s ease-in-out infinite;">🍬</div>
                    <p style="font-size: 1.6rem; font-weight: 900; margin-bottom: 20px; color: var(--text-color);">獲得糖果獎勵！</p>
                    <button class="btn-next" style="background: #ff6b81; box-shadow: 0 8px 0 #ee5253;" onclick="resetGame(true)">再次遊戲</button>
                </div>
            `;
            overlay.style.display = 'flex';
            speak("太厲害了！打敗魔王了！獲得糖果獎勵！");

            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffafcc', '#a2d2ff', '#bde0fe', '#ffc8dd', '#fff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffafcc', '#a2d2ff', '#bde0fe', '#ffc8dd', '#fff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function restoreDefaultOverlay() {
            const overlay = document.getElementById('overlay');
            overlay.innerHTML = `
                <div class="success-card">
                    <h2>太棒了！🌟</h2>
                    <button class="btn-next" onclick="resetGame()">下一個挑戰</button>
                </div>
            `;
        }

        function resetGame(isFullReset) {
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'none';
            if (isFullReset === true) {
                defeatedMonsters = 0;
            }
            restoreDefaultOverlay();

            currentOrderIndex++;
            if (currentOrderIndex >= wordIndices.length) {
                shuffleArray(wordIndices);
                currentOrderIndex = 0;
            }
            currentWordIndex = wordIndices[currentOrderIndex];
            initGame();
        }

        // 語音功能
        function speak(text) {
            if ('speechSynthesis' in window) {
                // 移除延遲，因為 iOS 規定語音必須在「點擊事件當下」直接觸發，否則會被阻擋
                // 移除 cancel()，因為在某些版本的 Safari 呼叫 cancel 後再 speak 會完全沒聲音
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-TW';
                utter.rate = 0.9;

                // 嘗試抓取本地語音庫，讓發音更穩定
                const voices = window.speechSynthesis.getVoices();
                const twVoice = voices.find(v => v.lang.includes('zh-TW') || v.lang.includes('zh_TW'));
                if (twVoice) {
                    utter.voice = twVoice;
                }

                window.speechSynthesis.speak(utter);
            } else {
                console.warn("您的瀏覽器不支援語音合成功能");
            }
        }

        // 啟動
        setTimeout(initGame, 500);

    </script>
</body>

</html>
